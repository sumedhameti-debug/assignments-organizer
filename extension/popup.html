<!DOCTYPE html>
<html>
  <head>
    <title>Assignments Organizer</title>
    <style>
      hr {
      height: 1px;
      background-color: black;
      margin-top: 12px;
      }

      body {
      width: 300px;
      font-family: Arial, sans-serif;
      }

      .nav {
	  display: flex;
	  align-items: center;      /* vertically center items */
	  justify-content: center;  /* center the whole group */
	  gap: 20px;                /* space between prev button, counter, next button */
	  margin: 10px 0;
      }

      #counter {
	  white-space: nowrap;  /* keep "1 / 5" on one line */
	  font-weight: bold;
      }

      button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      }

      button:disabled {
	  background-color: #ccc;
	  color: #666;
	  cursor: not-allowed;
      }

      select.placeholder {
	  color: grey;
      }

      select {
      color: black;
      }
      
      input, select {
      width: 100%;
      margin-top: 4px;
      padding: 5px;
      box-sizing: border-box;
      }

      label {
      display: block;
      margin-top: 12px;
      }
    </style>
  </head>
  <body>

    <h1 style="text-align: center;">Assignments Organizer</h1>

    <hr>

    <h4>Modify Assignments</h4>

    <label for="title">Assignment name</label>
    <input id="title" placeholder="Enter name">

    <label for="duration">Duration (minutes)</label>
    <input id="duration" type="number" min="1" placeholder="Enter duration">

    <label for="dueDate">Difficulty</label>
    <select id="difficulty">
      <option value="" disabled selected hidden>Select difficulty</option>
      <option value="EASY">Easy</option>
      <option value="MEDIUM">Medium</option>
      <option value="HARD">Hard</option>
    </select>

    <label for="dueDate">Last date to work on assignment</label>
    <input id="dueDate" type="date">

    <div class="nav">
      <button id="prevBtn"><</button>
			     <span id="counter"></span>
			     <button id="nextBtn">></button>
    </div>

    <button id="updateBtn" disabled>Save Update</button>
    <button id="deleteBtn">Remove Assignment</button>

    <hr>

    <h4>Schedule Assignments in Calendar</h4>

    <label for="inputCalendar">Input calendar</label>
    <select id="inputCalendar">
      <option value="" disabled selected hidden>Select input calendar</option>
    </select>

    <label for="outputCalendar">Output calendar</label>
    <select id="outputCalendar">
      <option value="" disabled selected hidden>Select output calendar</option>
    </select>

    <label for="studyDuration">Study duration (minutes)</label>
    <input id="studyDuration" type="number" min="1" placeholder="Enter study duration">

    <label for="breakDuration">Break duration (minutes)</label>
    <input id="breakDuration" type="number" min="0" placeholder="Enter break duration">

    <button id="runSchedulerBtn" disabled>Run Scheduler</button>

    <p id="status"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
